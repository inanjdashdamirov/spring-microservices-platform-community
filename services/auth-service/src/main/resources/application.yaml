server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://postgres:5432/platform_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.default_schema: auth_schema

  flyway:
    enabled: true
    schemas: auth_schema
    default-schema: auth_schema

jwt:
  secret: "very-secure-secret-key-change-this-later-very-long"
  expiration: 900000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} correlationId=%X{correlationId:-} %-5level %logger{36} - %msg%n"
