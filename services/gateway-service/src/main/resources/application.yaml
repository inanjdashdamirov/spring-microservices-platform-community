server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
          routes:
            - id: auth-service
              uri: http://auth-service:8081
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            - id: user-service
              uri: http://user-service:8082
              predicates:
                - Path=/api/users/**

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} correlationId=%X{correlationId:-} %-5level %logger{36} - %msg%n"

jwt:
  secret: "very-secure-secret-key-change-this-later-very-long"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
