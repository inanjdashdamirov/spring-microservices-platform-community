server:
  port: 0

jwt:
  secret: "test-jwt-secret-key-for-unit-and-integration-tests-32chars"

test:
  downstream:
    url: http://localhost:18080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${test.downstream.url}
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1
            - id: user-service
              uri: ${test.downstream.url}
              predicates:
                - Path=/api/users/**

logging:
  level:
    root: WARN
