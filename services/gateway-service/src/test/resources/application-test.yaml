server:
  port: 0

jwt:
  secret: "test-jwt-secret-key-for-unit-and-integration-tests-32chars"

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:18080
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1
            - id: user-service
              uri: http://localhost:18080
              predicates:
                - Path=/api/users/**

logging:
  level:
    root: WARN
